branches: [main]
tag_prefix: "v"
commit_pattern: '^(?P<type>\w+)(?:\((?P<scope>[^)]+)\))?(?P<breaking>!)?:\s+(?P<description>.+)'
changelog:
  file: CHANGELOG.md
floating_tags: true
version_files:
  - Cargo.toml
types:
  - { name: feat, bump: minor }
  - { name: fix, bump: patch }
  - { name: perf, bump: patch }
  - { name: docs }
  - { name: refactor }
  - { name: revert }
  - { name: chore }
  - { name: ci }
  - { name: test }
  - { name: build }
  - { name: style }
